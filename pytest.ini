# Konfigurasi untuk PyTest
[pytest]

# Menambahkan root project ke PYTHONPATH
# sehingga import seperti "from app.module import x" dapat berjalan
pythonpath = .

# Lokasi folder test yang akan dicari pytest
testpaths =
    tests

# Pola nama file test yang akan dijalankan
python_files =
    test_*.py
    *_test.py

# Pola nama class test
python_classes =
    Test*

# Pola nama function test
python_functions =
    test_*

# Opsi default yang selalu dijalankan saat "pytest" dieksekusi
addopts =
    # Menampilkan detail hasil test (verbose)
    -v

    # Error jika menggunakan marker yang belum didaftarkan
    --strict-markers

    # Error jika ada konfigurasi pytest yang tidak valid
    --strict-config

    # Menghitung code coverage pada folder testing
    --cov=tests

    # Menampilkan baris yang belum tercakup oleh test
    --cov-report=term-missing

    # Membuat file coverage.xml untuk integrasi CI/CD
    --cov-report=xml

# Menampilkan log ke terminal saat test berjalan
log_cli = true

# Menampilkan log level INFO ke atas
log_cli_level = INFO