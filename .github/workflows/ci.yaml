name: Railway Test CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "node/.nvmrc"
          cache: "npm"
          cache-dependency-path: node/package-lock.json

      # Install Python dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Install Node dependencies
      - name: Install Node Dependencies
        working-directory: node
        run: npm ci

      # Reformat HTML templates
      - name: Run Djlint Auto Lint
        run: djlint app --reformat

      # Fix CSS formatting and lint
      - name: Run Stylelint Fix Style
        working-directory: node
        run: npm run fix_css

      # Auto-fix Ruff issues
      - name: Run Ruff Auto Fix
        run: ruff check . --fix

      # Format Python code
      - name: Run Ruff Format
        run: ruff format .

      # Verify no lint issues remain
      - name: Run Ruff Check
        run: ruff check .

      # Run tests
      - name: Run Tests
        run: python -m pytest