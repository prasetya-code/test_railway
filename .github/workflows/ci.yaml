# =========================================================
# NAMA WORKFLOW
# =========================================================
# Nama workflow yang akan tampil di tab GitHub Actions
name: Python CI/CD Railway

# =========================================================
# EVENT TRIGGER
# =========================================================
# Menentukan kapan workflow dijalankan
on:

  # Trigger saat ada Pull Request
  pull_request:

    # Branch target PR
    branches:
      - main

    # Jenis aktivitas PR yang memicu workflow
    # opened        = PR baru dibuat
    # synchronize   = ada commit baru ke PR
    # reopened      = PR dibuka kembali
    # ready_for_review = draft menjadi ready
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Trigger saat ada push langsung
  push:

    # Branch yang dipantau
    branches:
      - main

  # Trigger manual dari GitHub UI
  workflow_dispatch:

# =========================================================
# ENVIRONMENT GLOBAL
# =========================================================
# Variable global yang tersedia untuk semua jobs
env:

  # Mode aplikasi
  APP_ENV: production

  # Versi Python default
  PYTHON_VERSION: "3.11"

  # Flask environment
  FLASK_ENV: production

  # Path project
  PYTHONPATH: .

# =========================================================
# PERMISSIONS
# =========================================================
# Permission token GitHub Actions
permissions:

  # Read repository content
  contents: read

  # Write pull request status/comment
  pull-requests: write

# =========================================================
# JOBS
# =========================================================
jobs:

  # =======================================================
  # JOB: TEST & VALIDATION
  # =======================================================
  test:

    # Nama job yang tampil di GitHub
    name: Test and Validation

    # Operating System runner
    runs-on: ubuntu-latest

    # Timeout maksimal job
    timeout-minutes: 15

    # Strategy matrix
    # Menjalankan test di beberapa versi Python
    strategy:

      fail-fast: true

      matrix:

        python-version:
          - "3.10"
          - "3.11"

    # Step-step yang dijalankan
    steps:

      # ===================================================
      # STEP: Checkout repository
      # ===================================================
      - name: Checkout Repository

        # GitHub official action
        uses: actions/checkout@v4

      # ===================================================
      # STEP: Setup Python
      # ===================================================
      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          # Mengambil versi dari matrix
          python-version: ${{ matrix.python-version }}

          # Cache dependency pip
          cache: "pip"

      # ===================================================
      # STEP: Install dependencies
      # ===================================================
      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install \
            pytest \
            pytest-cov \
            ruff \
            black \
            bandit \
            gunicorn

      # ===================================================
      # STEP: Lint check
      # ===================================================
      - name: Run Linter

        run: |

          ruff check .

      # ===================================================
      # STEP: Ruff format validation
      # ===================================================
      # - name: Check Ruff Formatting

      #   run: |

      #     ruff format --check .

      # ===================================================
      # STEP: Format validation
      # ===================================================
      - name: Check Code Formatting

        run: |

          black --check .

      # ===================================================
      # STEP: Security scan
      # ===================================================
      - name: Run Security Scan

        run: |

          bandit -r . -q

      # ===================================================
      # STEP: Validate Flask App
      # ===================================================
      # Memastikan aplikasi Flask bisa boot
      - name: Validate Flask Application

        env:

          # Ganti sesuai entrypoint Flask kamu
          FLASK_APP: app.py

        run: |

          flask routes

      # ===================================================
      # STEP: Run unit tests
      # ===================================================
      - name: Run Unit Tests

        run: |

          pytest --cov=. --cov-report=term-missing

      # ===================================================
      # STEP: Upload artifact/log
      # ===================================================
      - name: Upload Test Results

        # Step tetap dijalankan walaupun gagal
        if: always()

        uses: actions/upload-artifact@v4

        with:

          # Nama artifact
          name: test-results-${{ matrix.python-version }}

          # File/folder yang diupload
          path: |
            .pytest_cache
            .ruff_cache
            .coverage

          # Tidak error jika file tidak ada
          if-no-files-found: ignore

  # =======================================================
  # JOB: DEPLOY
  # =======================================================
  deploy:

    # Nama job
    name: Deploy to Railway

    # Job ini hanya jalan jika test sukses
    needs: test

    # Runner OS
    runs-on: ubuntu-latest

    # Timeout deploy
    timeout-minutes: 10

    # Conditional deploy
    # Hanya deploy saat push ke main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      # ===================================================
      # STEP: Checkout repository
      # ===================================================
      - name: Checkout Repository

        uses: actions/checkout@v4

      # ===================================================
      # STEP: Install Node.js
      # ===================================================
      # Railway CLI membutuhkan Node.js
      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: "20"

      # ===================================================
      # STEP: Install Railway CLI
      # ===================================================
      - name: Install Railway CLI

        run: |

          npm install -g @railway/cli

      # ===================================================
      # STEP: Railway Login Validation
      # ===================================================
      - name: Validate Railway Token

        run: |

          railway whoami

        env:

          # Mengambil token dari GitHub Secrets
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ===================================================
      # STEP: Deploy
      # ===================================================
      - name: Deploy to Railway

        run: |

          railway up --detach

        env:

          # Secret token Railway
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # =======================================================
  # JOB: NOTIFICATION (OPSIONAL)
  # =======================================================
  notify:

    # Job jalan setelah deploy
    needs: deploy

    runs-on: ubuntu-latest

    # Tetap jalan walaupun deploy gagal
    if: always()

    steps:

      - name: Notify Status

        run: |

          echo "Workflow selesai"

          echo "Status deploy: ${{ needs.deploy.result }}"