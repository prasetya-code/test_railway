name: railways test CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        python-version: ['3.10', '3.11']

    steps:

      # Mengambil source code repository
      - name: Checkout Repository

        # Reusable action resmi GitHub
        uses: actions/checkout@v4

      # Setup Python environment
      - name: Setup Python

        # Reusable action resmi GitHub
        uses: actions/setup-python@v5

        # Parameter action
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install dependency project
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Menjalankan auto fix Ruff
      - name: Run Ruff Auto Fix
        run: |
          ruff check . --fix

      # Menjalankan formatter Ruff
      - name: Run Ruff Format
        run: |
          ruff format .

      # Verifikasi tidak ada lint error tersisa
      - name: Run Ruff Check
        run: |
          ruff check .

      # Menjalankan unit test with pytets.ini
      - name: Run Tests
        run: pytest